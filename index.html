<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography Tester</title>
    <style>
        :root {
            --bg: #000000; --surface: #1a1a1a; --border: #333333;
            --text: #ffffff; --muted: #888888; --accent: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 40px; text-align: center; }
        h1 { font-weight: 700; text-transform: uppercase; letter-spacing: 4px; font-size: 2rem; }
        header p { color: var(--muted); margin-top: 10px; font-size: 0.9rem; letter-spacing: 1px; }

        .controls { background-color: var(--surface); padding: 24px; border-radius: 8px; margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 20px; border: 1px solid var(--border); }
        .control-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 150px; }
        label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        
        input[type="text"], input[type="number"], select {
            background-color: #000; border: 1px solid var(--border); color: var(--text);
            padding: 12px; border-radius: 4px; font-size: 1rem; outline: none; transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--accent); }
        
        select {
            appearance: none; -webkit-appearance: none; -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888888' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 1rem center; background-size: 1rem; padding-right: 2.5rem;
        }

        .toggles { display: flex; flex-wrap: wrap; gap: 12px; padding-top: 10px; max-width: 100%; }
        .toggle-label { display: flex; align-items: center; gap: 6px; text-transform: none; letter-spacing: 0.5px; font-size: 0.8rem; color: var(--text); cursor: pointer; transition: color 0.2s, opacity 0.2s; background: #000; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; }
        .toggle-label.disabled { opacity: 0.3; cursor: not-allowed; text-decoration: line-through; }
        input[type="checkbox"] { width: 14px; height: 14px; accent-color: #fff; cursor: pointer; }
        input[type="checkbox"]:disabled { cursor: not-allowed; }

        .preview-area { background-color: #ffffff; border-radius: 8px; padding: 40px; min-height: 200px; overflow-x: auto; border: 1px solid var(--border); }
        #svg-canvas { width: 100%; height: 100%; min-height: 250px; display: block; }
        .path-render { fill: #000000; stroke: none; }
        .info { margin-top: 20px; font-size: 0.85rem; color: var(--muted); text-align: center; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Typography Tester</h1>
        <p>Dynamically supports all extracted OpenType features</p>
    </header>
    
    <div class="controls">
        <div class="control-group">
            <label for="familySelect">Font Family</label>
            <select id="familySelect"></select>
        </div>
        <div class="control-group">
            <label for="variantSelect">Variant</label>
            <select id="variantSelect"></select>
        </div>
        <div class="control-group" style="flex: 2;">
            <label for="textInput">Text</label>
            <input type="text" id="textInput" value="AVAVA 1234 fi fl ff" placeholder="Type something...">
        </div>
        <div class="control-group" style="flex: 1;">
            <label for="sizeInput">Size (px)</label>
            <input type="number" id="sizeInput" value="80" min="10" max="250">
        </div>
        <div class="control-group" style="flex: 4; min-width: 300px;">
            <label>OpenType Features</label>
            <div class="toggles" id="togglesContainer"></div>
        </div>
    </div>

    <div class="preview-area">
        <svg id="svg-canvas" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    
    <div class="info">Features adapt automatically based on the selected font's availability</div>
</div>

<script src="font-database.js"></script>
<script>
    let fontsDB = {};
    let currentFont = null;

    const svgCanvas = document.getElementById('svg-canvas');
    const textInput = document.getElementById('textInput');
    const sizeInput = document.getElementById('sizeInput');
    const familySelect = document.getElementById('familySelect');
    const variantSelect = document.getElementById('variantSelect');
    const togglesContainer = document.getElementById('togglesContainer');

    // List of all possible features with display names and priority order
    const featureConfig = [
        { tag: 'kern', name: 'Kerning', type: 'pair' },
        { tag: 'liga', name: 'Ligatures', type: 'liga' },
        { tag: 'dlig', name: 'Disc. Lig', type: 'liga' },
        { tag: 'smcp', name: 'Small Caps', type: 'sub' },
        { tag: 'titl', name: 'Titling', type: 'sub' },
        { tag: 'swsh', name: 'Swashes', type: 'sub' },
        { tag: 'salt', name: 'Alternates', type: 'sub' },
        { tag: 'hist', name: 'Historical', type: 'sub' },
        { tag: 'ss01', name: 'Set 1', type: 'sub' },
        { tag: 'ss02', name: 'Set 2', type: 'sub' },
        { tag: 'ss03', name: 'Set 3', type: 'sub' },
        { tag: 'ss04', name: 'Set 4', type: 'sub' },
        { tag: 'ss05', name: 'Set 5', type: 'sub' },
        { tag: 'sups', name: 'Superscript', type: 'sub' },
        { tag: 'subs', name: 'Subscript', type: 'sub' },
        { tag: 'tnum', name: 'Tabular Fig', type: 'sub' },
        { tag: 'pnum', name: 'Prop. Fig', type: 'sub' },
        { tag: 'onum', name: 'Oldstyle Fig', type: 'sub' },
        { tag: 'lnum', name: 'Lining Fig', type: 'sub' },
        { tag: 'zero', name: 'Slashed Zero', type: 'sub' }
    ];

    function loadDatabase() {
        if (typeof window.SVG_FONTS_DATABASE === 'undefined') { alert("Database not found!"); return; }
        try {
            fontsDB = JSON.parse(decodeURIComponent(escape(atob(window.SVG_FONTS_DATABASE))));
            populateFamilyDropdown();
        } catch (e) { console.error(e); }
    }

    function populateFamilyDropdown() {
        familySelect.innerHTML = '';
        for (let f in fontsDB) { let o = document.createElement('option'); o.value = f; o.text = f; familySelect.add(o); }
        populateVariantDropdown();
    }

    function populateVariantDropdown() {
        variantSelect.innerHTML = '';
        let fam = familySelect.value;
        if (fontsDB[fam]) { for (let v in fontsDB[fam]) { let o = document.createElement('option'); o.value = v; o.text = v; variantSelect.add(o); } }
        loadActiveFont();
    }

    function loadActiveFont() {
        const fam = familySelect.value, varName = variantSelect.value;
        if (fontsDB[fam] && fontsDB[fam][varName]) {
            let fd = fontsDB[fam][varName];
            currentFont = {
                glyphs: fd.glyphs || {},
                kerning: fd.kerning || {},
                features: fd.features || {},
                unitsPerEm: fd.m.u, ascent: fd.m.a, descent: fd.m.d, defaultAdvance: fd.m.da
            };
            buildFeatureToggles();
            renderText();
        }
    }

    function buildFeatureToggles() {
        togglesContainer.innerHTML = '';
        featureConfig.forEach(fc => {
            let hasData = false;
            if (fc.tag === 'kern') hasData = Object.keys(currentFont.kerning).length > 0;
            else if (fc.type === 'liga' || fc.type === 'sub') {
                let fData = currentFont.features[fc.tag];
                hasData = fData && Object.keys(fData).length > 0;
            }

            let label = document.createElement('label');
            label.className = 'toggle-label' + (hasData ? '' : ' disabled');
            label.id = `lbl-${fc.tag}`;
            
            let input = document.createElement('input');
            input.type = 'checkbox';
            input.id = `chk-${fc.tag}`;
            input.disabled = !hasData;
            input.checked = hasData;
            input.addEventListener('change', renderText);
            
            label.appendChild(input);
            label.appendChild(document.createTextNode(fc.name));
            togglesContainer.appendChild(label);
        });
    }

    function getFeatureGlyphData(char) {
        const priority = ['titl', 'swsh', 'sups', 'subs', 'hist', 'smcp', 'salt', 'ss05', 'ss04', 'ss03', 'ss02', 'ss01', 'zero', 'tnum', 'pnum', 'onum', 'lnum'];
        for (let tag of priority) {
            let chk = document.getElementById(`chk-${tag}`);
            if (chk && chk.checked && !chk.disabled) {
                if (currentFont.features[tag] && currentFont.features[tag][char]) return currentFont.features[tag][char];
            }
        }
        return currentFont.glyphs[char] || null;
    }

    function renderText() {
        if (!currentFont) return;
        const text = textInput.value;
        const fontSize = parseInt(sizeInput.value);
        
        svgCanvas.innerHTML = '';
        const scale = fontSize / currentFont.unitsPerEm;
        const lineHeight = (currentFont.ascent - currentFont.descent) * scale;
        const padding = 20;

        // 1. Process Ligatures
        let renderQueue = [];
        let i = 0;
        let ligaActive = document.getElementById('chk-liga') && document.getElementById('chk-liga').checked && !document.getElementById('chk-liga').disabled;
        
        while (i < text.length) {
            let matched = false;
            if (ligaActive) {
                for (let len = 3; len >= 2; len--) {
                    if (i <= text.length - len) {
                        let seq = text.substring(i, i + len);
                        if (currentFont.features.liga && currentFont.features.liga[seq]) {
                            renderQueue.push({ chars: seq, data: currentFont.features.liga[seq] });
                            i += len; matched = true; break;
                        }
                    }
                }
            }
            if (!matched) {
                let char = text[i];
                renderQueue.push({ chars: char, data: getFeatureGlyphData(char) });
                i++;
            }
        }

        // 2. Calculate total width (First Pass)
        let kernActive = document.getElementById('chk-kern') && document.getElementById('chk-kern').checked && !document.getElementById('chk-kern').disabled;
        let prevChar = null;
        let tempCursorX = padding;
        
        for (let item of renderQueue) {
            let gd = item.data;
            let cc = item.chars.charAt(item.chars.length - 1); 

            if (kernActive && prevChar && currentFont.kerning[`${prevChar}|${cc}`] !== undefined) {
                tempCursorX += currentFont.kerning[`${prevChar}|${cc}`] * scale;
            }

            if (gd) {
                tempCursorX += gd.a * scale;
            } else {
                tempCursorX += currentFont.defaultAdvance * scale;
            }
            prevChar = cc;
        }
        
        // 3. Set dynamic ViewBox to exactly match the text bounds
        const totalWidth = Math.max(tempCursorX + padding, 100); // Min width 100 to prevent collapse
        const totalHeight = lineHeight + (padding * 2);

        svgCanvas.setAttribute('viewBox', `0 0 ${totalWidth} ${totalHeight}`);
        svgCanvas.setAttribute('width', '100%');
        svgCanvas.setAttribute('height', totalHeight);
        svgCanvas.setAttribute('preserveAspectRatio', 'xMinYMin meet');

        // 4. Draw paths (Second Pass)
        let cursorX = padding;
        const baselineY = currentFont.ascent * scale + padding;
        prevChar = null;

        for (let item of renderQueue) {
            let gd = item.data;
            let cc = item.chars.charAt(item.chars.length - 1); 

            if (kernActive && prevChar && currentFont.kerning[`${prevChar}|${cc}`] !== undefined) {
                cursorX += currentFont.kerning[`${prevChar}|${cc}`] * scale;
            }

            if (gd) {
                if (gd.p !== '') {
                    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    p.setAttribute('d', gd.p);
                    p.setAttribute('class', 'path-render');
                    p.setAttribute('transform', `translate(${cursorX}, ${baselineY}) scale(${scale}, -${scale})`);
                    svgCanvas.appendChild(p);
                }
                cursorX += gd.a * scale;
            } else {
                cursorX += currentFont.defaultAdvance * scale;
            }
            prevChar = cc;
        }
    }

    familySelect.addEventListener('change', populateVariantDropdown);
    variantSelect.addEventListener('change', loadActiveFont);
    textInput.addEventListener('input', renderText);
    sizeInput.addEventListener('input', renderText);

    loadDatabase();
</script>
</body>
</html>
