<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography Tester</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #1a1a1a;
            --border: #333333;
            --text: #ffffff;
            --muted: #888888;
            --accent: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 40px; text-align: center; }
        h1 { font-weight: 700; text-transform: uppercase; letter-spacing: 4px; font-size: 2rem; }
        header p { color: var(--muted); margin-top: 10px; font-size: 0.9rem; letter-spacing: 1px; }

        .controls {
            background-color: var(--surface);
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid var(--border);
        }
        .control-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 150px; }
        label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        
        input[type="text"], input[type="number"], select {
            background-color: #000000;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--accent); }
        
        select {
            appearance: none; -webkit-appearance: none; -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888888' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 1rem center; background-size: 1rem;
            padding-right: 2.5rem;
        }

        .toggles { display: flex; gap: 20px; padding-top: 10px; }
        .toggle-label {
            display: flex; align-items: center; gap: 8px; 
            text-transform: none; letter-spacing: 0.5px; font-size: 0.9rem; color: var(--text);
            cursor: pointer;
            transition: color 0.2s, opacity 0.2s;
        }
        .toggle-label.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        input[type="checkbox"] { width: 16px; height: 16px; accent-color: #fff; cursor: pointer; }
        input[type="checkbox"]:disabled { cursor: not-allowed; }

        .preview-area {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 40px;
            min-height: 400px;
            overflow-x: auto;
            border: 1px solid var(--border);
        }
        #svg-canvas { width: 100%; height: 100%; min-height: 300px; }
        .path-render { fill: #000000; stroke: none; }
        .info { margin-top: 20px; font-size: 0.85rem; color: var(--muted); text-align: center; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Typography Tester</h1>
        <p>Test fonts with dynamic OpenType Features</p>
    </header>
    
    <div class="controls">
        <div class="control-group">
            <label for="familySelect">Font Family</label>
            <select id="familySelect"></select>
        </div>
        <div class="control-group">
            <label for="variantSelect">Variant</label>
            <select id="variantSelect"></select>
        </div>
        <div class="control-group" style="flex: 2;">
            <label for="textInput">Text</label>
            <input type="text" id="textInput" value="Type few words. AVAVA, fi fl ff." placeholder="Type something...">
        </div>
        <div class="control-group" style="flex: 1;">
            <label for="sizeInput">Size (px)</label>
            <input type="number" id="sizeInput" value="80" min="10" max="250">
        </div>
        <div class="control-group" style="flex: 1; min-width: 180px;">
            <label>OpenType Features</label>
            <div class="toggles">
                <label class="toggle-label" id="kerningLabel"><input type="checkbox" id="kerningToggle" checked> Kerning</label>
                <label class="toggle-label" id="ligaLabel"><input type="checkbox" id="ligaToggle" checked> Ligatures</label>
            </div>
        </div>
    </div>

    <div class="preview-area">
        <svg id="svg-canvas" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    
    <div class="info">Features adapt automatically based on the selected font's availability</div>
</div>

<script src="font-database.js"></script>
<script>
    let fontsDB = {};
    let currentFont = null;

    const svgCanvas = document.getElementById('svg-canvas');
    const textInput = document.getElementById('textInput');
    const sizeInput = document.getElementById('sizeInput');
    const familySelect = document.getElementById('familySelect');
    const variantSelect = document.getElementById('variantSelect');
    const kerningToggle = document.getElementById('kerningToggle');
    const ligaToggle = document.getElementById('ligaToggle');
    const kerningLabel = document.getElementById('kerningLabel');
    const ligaLabel = document.getElementById('ligaLabel');

    // Unscrambles the database
    function loadDatabase() {
        if (typeof window.SVG_FONTS_DATABASE === 'undefined') {
            alert("Font database not found! Generate the font-database.js file.");
            return;
        }
        try {
            const jsonData = decodeURIComponent(escape(atob(window.SVG_FONTS_DATABASE)));
            fontsDB = JSON.parse(jsonData);
            populateFamilyDropdown();
        } catch (e) {
            console.error("Error reading database", e);
        }
    }

    function populateFamilyDropdown() {
        familySelect.innerHTML = '';
        for (let familyName in fontsDB) {
            let option = document.createElement('option');
            option.value = familyName;
            option.innerText = familyName;
            familySelect.appendChild(option);
        }
        populateVariantDropdown();
    }

    function populateVariantDropdown() {
        const selectedFamily = familySelect.value;
        variantSelect.innerHTML = '';
        if (fontsDB[selectedFamily]) {
            for (let variantName in fontsDB[selectedFamily]) {
                let option = document.createElement('option');
                option.value = variantName;
                option.innerText = variantName;
                variantSelect.appendChild(option);
            }
        }
        loadActiveFont();
    }

    function loadActiveFont() {
        const family = familySelect.value;
        const variant = variantSelect.value;
        
        if (fontsDB[family] && fontsDB[family][variant]) {
            const fontData = fontsDB[family][variant];
            
            // Load font data
            currentFont = {
                glyphs: fontData.glyphs,
                ligatures: fontData.ligatures || {},
                kerning: fontData.kerning || {},
                unitsPerEm: fontData.m.u,
                ascent: fontData.m.a,
                descent: fontData.m.d,
                defaultAdvance: fontData.m.da
            };

            // --- DYNAMIC OPENTYPE FEATURE DETECTION ---
            
            // 1. Check Ligatures availability
            const hasLigatures = Object.keys(currentFont.ligatures).length > 0;
            ligaToggle.disabled = !hasLigatures;
            ligaToggle.checked = hasLigatures; // Auto-enable if available
            ligaLabel.classList.toggle('disabled', !hasLigatures);

            // 2. Check Kerning availability
            const hasKerning = Object.keys(currentFont.kerning).length > 0;
            kerningToggle.disabled = !hasKerning;
            kerningToggle.checked = hasKerning; // Auto-enable if available
            kerningLabel.classList.toggle('disabled', !hasKerning);

            renderText();
        }
    }

    function renderText() {
        if (!currentFont) return;
        const text = textInput.value;
        const fontSize = parseInt(sizeInput.value);
        
        svgCanvas.innerHTML = '';
        const scale = fontSize / currentFont.unitsPerEm;
        const lineHeight = (currentFont.ascent - currentFont.descent) * scale;
        
        svgCanvas.setAttribute('viewBox', `0 0 2000 ${lineHeight + 40}`);
        svgCanvas.setAttribute('height', lineHeight + 40);

        let cursorX = 20;
        const baselineY = currentFont.ascent * scale + 20;

        // 1. Process Ligatures (Substitution) - Only if toggle is active and enabled
        let renderQueue = [];
        let i = 0;
        while (i < text.length) {
            let matched = false;
            if (ligaToggle.checked && !ligaToggle.disabled) {
                // Check for 3-character ligatures (ffi, ffl)
                if (i < text.length - 2) {
                    let tri = text.substring(i, i + 3);
                    if (currentFont.ligatures[tri]) {
                        renderQueue.push({ chars: tri, data: currentFont.ligatures[tri] });
                        i += 3;
                        matched = true;
                    }
                }
                // Check for 2-character ligatures (fi, fl, ff)
                if (!matched && i < text.length - 1) {
                    let bi = text.substring(i, i + 2);
                    if (currentFont.ligatures[bi]) {
                        renderQueue.push({ chars: bi, data: currentFont.ligatures[bi] });
                        i += 2;
                        matched = true;
                    }
                }
            }
            if (!matched) {
                let char = text[i];
                renderQueue.push({ chars: char, data: currentFont.glyphs[char] || null });
                i++;
            }
        }

        // 2. Draw and Apply Kerning - Only if toggle is active and enabled
        let prevChar = null;
        
        for (let item of renderQueue) {
            let glyphData = item.data;
            // For kerning, use the last char of the ligature or sequence
            let currentChar = item.chars.charAt(item.chars.length - 1); 

            // Apply Kerning
            if (kerningToggle.checked && !kerningToggle.disabled && prevChar) {
                let kernKey = `${prevChar}|${currentChar}`;
                if (currentFont.kerning[kernKey] !== undefined) {
                    cursorX += currentFont.kerning[kernKey] * scale;
                }
            }

            if (glyphData) {
                if (glyphData.p !== '') {
                    const pathElement = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    pathElement.setAttribute('d', glyphData.p);
                    pathElement.setAttribute('class', 'path-render');
                    pathElement.setAttribute('transform', `translate(${cursorX}, ${baselineY}) scale(${scale})`);
                    svgCanvas.appendChild(pathElement);
                }
                cursorX += glyphData.a * scale;
            } else {
                cursorX += currentFont.defaultAdvance * scale;
            }
            
            prevChar = currentChar;
        }
        
        svgCanvas.setAttribute('width', cursorX + 40);
    }

    // Events
    familySelect.addEventListener('change', populateVariantDropdown);
    variantSelect.addEventListener('change', loadActiveFont);
    textInput.addEventListener('input', renderText);
    sizeInput.addEventListener('input', renderText);
    kerningToggle.addEventListener('change', renderText);
    ligaToggle.addEventListener('change', renderText);

    // Initialization
    loadDatabase();
</script>
</body>
</html>
