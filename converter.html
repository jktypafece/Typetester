<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced OpenType Font Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .box { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { padding: 10px; margin: 5px 0; display: block; width: 100%; max-width: 300px;}
        textarea { width: 100%; height: 200px; margin-top: 10px; }
        button { background: #000; color: #fff; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #333; }
    </style>
</head>
<body>
    <div class="box">
        <h2>1. Add Font (Deep Feature Extraction)</h2>
        <input type="text" id="familyName" placeholder="Family Name (e.g., Roboto)">
        <input type="text" id="variantName" placeholder="Variant (e.g., Regular, Bold)">
        <input type="file" id="fileInput" accept=".ttf, .otf">
    </div>
    <div class="box">
        <h2>2. Added Fonts</h2>
        <ul id="fontList"></ul>
    </div>
    <div class="box">
        <h2>3. Final Code</h2>
        <button onclick="generateDatabase()">Generate Base64 Code</button>
        <button onclick="copyText()">Copy Code</button>
        <textarea id="output" readonly></textarea>
    </div>
    <script>
        let database = {};

        // Mapping Adobe Glyph Names to Unicode characters
        const numNames = { 'zero':'0', 'one':'1', 'two':'2', 'three':'3', 'four':'4', 'five':'5', 'six':'6', 'seven':'7', 'eight':'8', 'nine':'9' };
        const ligNames = { 'f_f_i':'ffi', 'f_f_l':'ffl', 'f_i':'fi', 'f_l':'fl', 'f_f':'ff' };

        // Mapping feature tags to their respective suffixes
        const featureSuffixes = {
            smcp: ['.smcp', '.sc'],          // Small Caps
            salt: ['.alt', '.salt'],         // Stylistic Alternates
            onum: ['.oldstyle', '.osf'],     // Oldstyle Figures
            tnum: ['.tabular', '.tnum', '.tf'], // Tabular Figures
            lnum: ['.lining', '.lnum', '.lf'], // Lining Figures
            pnum: ['.proportional', '.pnum'], // Proportional Figures
            zero: ['.zero'],                 // Slashed Zero
            swsh: ['.swsh', '.sw'],          // Swashes
            hist: ['.hist'],                 // Historical Forms
            sups: ['.sups', '.superior'],    // Superscript
            subs: ['.subs', '.inferior'],    // Subscript
            titl: ['.titl'],                 // Titling
            ss01: ['.ss01'], ss02: ['.ss02'], ss03: ['.ss03'], ss04: ['.ss04'], ss05: ['.ss05'],
            ss06: ['.ss06'], ss07: ['.ss07'], ss08: ['.ss08'], ss09: ['.ss09'], ss10: ['.ss10']
        };

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const font = opentype.parse(event.target.result);
                    extractFontData(font);
                } catch (err) { alert("Error parsing font file."); }
            };
            reader.readAsArrayBuffer(file);
        });

        function extractFontData(font) {
            const glyphs = {};
            const ligatures = {};
            const kerning = {};
            const features = {};
            
            // Initialize feature arrays
            for (let key in featureSuffixes) features[key] = {};

            const unitsPerEm = font.unitsPerEm || 1000;
            const ascent = font.ascender || 800;
            const descent = font.descender || -200;
            const defaultAdvance = 500;

            for (let i = 0; i < font.glyphs.length; i++) {
                const glyph = font.glyphs.get(i);
                const pathData = glyph.path ? glyph.path.toPathData() : '';
                const adv = glyph.advanceWidth || defaultAdvance;
                const gName = glyph.name || '';

                // 1. Standard Glyphs
                if (glyph.unicode !== undefined && glyph.unicode !== 0) {
                    const char = String.fromCharCode(glyph.unicode);
                    glyphs[char] = { a: adv, p: pathData };
                }

                // 2. Ligatures by Name
                if (ligNames[gName]) {
                    features.liga = features.liga || {}; // Store ligatures under features.liga
                    features.liga[ligNames[gName]] = { a: adv, p: pathData };
                }

                // 3. Alternate Features by Suffix
                for (let ftag in featureSuffixes) {
                    featureSuffixes[ftag].forEach(suffix => {
                        if (gName.endsWith(suffix)) {
                            let baseName = gName.replace(suffix, '');
                            let baseChar = null;
                            if (baseName.length === 1) baseChar = baseName;
                            else if (numNames[baseName]) baseChar = numNames[baseName];
                            
                            if (baseChar) features[ftag][baseChar] = { a: adv, p: pathData };
                        }
                    });
                }
            }

            // Fallback: Extract standard ligatures if naming convention failed
            if (!features.liga || Object.keys(features.liga).length === 0) {
                ['fi', 'fl', 'ff', 'ffi', 'ffl'].forEach(liga => {
                    const lg = font.charToGlyph(liga);
                    const fg = font.charToGlyph(liga[0]);
                    if (lg.path && lg.path.toPathData() !== fg.path.toPathData()) {
                        features.liga[liga] = { a: lg.advanceWidth || defaultAdvance, p: lg.path.toPathData() };
                    }
                });
            }

            // 4. Kerning Pairs
            const charsToKern = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,;:!? ";
            const charGlyphs = {};
            charsToKern.split('').forEach(c => { charGlyphs[c] = font.charToGlyph(c); });
            for (let i = 0; i < charsToKern.length; i++) {
                for (let j = 0; j < charsToKern.length; j++) {
                    const l = charsToKern[i], r = charsToKern[j];
                    const v = font.getKerningValue(charGlyphs[l], charGlyphs[r]);
                    if (v && v !== 0) kerning[`${l}|${r}`] = v;
                }
            }

            const family = document.getElementById('familyName').value || 'Default Family';
            const variant = document.getElementById('variantName').value || 'Regular';
            
            if (!database[family]) database[family] = {};
            database[family][variant] = { glyphs, kerning, features, m: { u: unitsPerEm, a: ascent, d: descent, da: defaultAdvance } };
            
            updateList();
            document.getElementById('fileInput').value = '';
        }

        function updateList() {
            const list = document.getElementById('fontList');
            list.innerHTML = '';
            for (let family in database) {
                for (let variant in database[family]) {
                    list.innerHTML += `<li><strong>${family}</strong> - ${variant}</li>`;
                }
            }
        }

        function generateDatabase() {
            const encodedData = btoa(unescape(encodeURIComponent(JSON.stringify(database))));
            document.getElementById('output').value = `window.SVG_FONTS_DATABASE="${encodedData}";`;
        }

        function copyText() {
            const textarea = document.getElementById('output');
            textarea.select();
            document.execCommand('copy');
            alert('Code copied! Create the font-database.js file and paste this inside.');
        }
    </script>
</body>
</html>
